<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFS Error Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Light theme — IFS Community-inspired: white content, dark top bar */
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface-2: #f1f3f7;
    --border: #e6e8ef;
    --border-strong: #d5d9e4;
    --text: #16181f;
    --text-2: #565e70;
    --text-3: #8a90a2;
    --accent: #1d6fd6;
    --accent-dim: #e8f1fc;
    --success: #15a34a;
    --success-dim: #e7f7ec;
    --warning: #b8730a;
    --warning-dim: #fdf3e3;
    --danger: #d92d20;
    --danger-dim: #fdecea;
    /* dark top bar (echoes IFS's black header) */
    --header-bg: #0b0b0f;
    --header-text: #ffffff;
    --header-text-dim: rgba(255,255,255,.55);
    --radius: 10px;
    --font: 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--header-bg);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: white; letter-spacing: -.02em;
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--header-text); letter-spacing: .01em; }
  .header-sub { font-size: 12px; color: var(--header-text-dim); margin-left: auto; }
  .catalog-status {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    background: var(--accent-dim); color: var(--accent);
    margin-left: 8px;
  }
  .catalog-status.loading { background: var(--warning-dim); color: var(--warning); }
  .catalog-status.error { background: var(--danger-dim); color: var(--danger); }

  /* Layout */
  .app { display: flex; height: calc(100vh - 57px); }

  /* Sidebar */
  .sidebar {
    width: 200px; min-width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 12px 8px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 500; color: var(--text-2);
    cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; transition: all .15s;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }
  .nav-item-primary { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .nav-item-primary .nav-icon { font-size: 17px; }
  .nav-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--text-3); padding: 14px 12px 4px;
  }
  .nav-badge {
    margin-left: auto; font-size: 10px; font-weight: 600;
    background: var(--accent); color: white;
    padding: 1px 6px; border-radius: 999px;
  }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }

  /* Main content */
  .main { flex: 1; overflow-y: auto; padding: 24px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-2); text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: 14px;
  }

  /* Upload zone */
  .drop-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 40px 20px; text-align: center;
    cursor: pointer; transition: all .15s;
  }
  .drop-zone:hover, .drop-zone.drag {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .drop-icon { font-size: 32px; margin-bottom: 10px; }
  .drop-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .drop-sub { font-size: 12px; color: var(--text-3); }

  /* Preview */
  .preview-img {
    max-width: 100%; max-height: 220px;
    border-radius: 8px; display: block;
    margin: 0 auto 16px; border: 1px solid var(--border);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled { opacity: .4; cursor: default; }
  .btn-ghost {
    background: none; border: 1px solid var(--border-strong);
    color: var(--text-2);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: none; border: none; color: var(--danger); font-size: 12px; cursor: pointer; padding: 4px 8px; }
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  /* Spinner */
  .spin {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: white; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Progress steps */
  .steps { display: flex; gap: 0; margin-bottom: 16px; }
  .step-item {
    flex: 1; text-align: center; font-size: 11px;
    color: var(--text-3); position: relative;
  }
  .step-item.active { color: var(--accent); }
  .step-item.done { color: var(--success); }
  .step-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--surface-2); border: 1.5px solid var(--border-strong);
    margin: 0 auto 4px; display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  .step-item.active .step-dot { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .step-item.done .step-dot { border-color: var(--success); background: var(--success-dim); color: var(--success); }
  .step-line {
    position: absolute; top: 10px; left: 50%; right: -50%;
    height: 1px; background: var(--border); z-index: 0;
  }
  .step-item:last-child .step-line { display: none; }

  /* Extracted text box */
  .extracted-box {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    font-family: var(--mono); font-size: 12px;
    color: var(--text); line-height: 1.6;
    white-space: pre-wrap; word-break: break-word;
    margin-bottom: 14px;
  }
  .extracted-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-3);
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .extracted-label .saved-tag {
    background: var(--success-dim); color: var(--success);
    padding: 1px 6px; border-radius: 4px; font-size: 10px;
  }

  /* Match result */
  .match-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 999px; margin-bottom: 12px;
  }
  .match-badge.high { background: var(--success-dim); color: var(--success); }
  .match-badge.medium { background: var(--warning-dim); color: var(--warning); }
  .match-badge.low { background: var(--surface-2); color: var(--text-2); }
  .match-badge.none { background: var(--danger-dim); color: var(--danger); }

  /* Catalog match info */
  .catalog-match {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; margin-bottom: 14px;
  }
  .catalog-match-row {
    display: flex; gap: 8px; align-items: center;
    font-size: 12px; margin-bottom: 4px;
  }
  .catalog-match-row:last-child { margin-bottom: 0; }
  .cm-label { color: var(--text-3); min-width: 90px; }
  .cm-value { color: var(--text); font-weight: 500; }
  .cm-code {
    font-family: var(--mono); font-size: 11px;
    background: var(--accent-dim); color: var(--accent);
    padding: 1px 6px; border-radius: 4px;
  }

  /* Verification box */
  .verify-box {
    background: var(--accent-dim); border: 1px solid var(--accent);
    border-radius: 8px; padding: 14px; margin-bottom: 14px;
  }
  .verify-question { font-size: 13px; margin-bottom: 10px; }
  .verify-btns { display: flex; gap: 8px; }
  .verify-btn {
    flex: 1; padding: 8px; border-radius: 8px; font-size: 12px;
    font-weight: 500; cursor: pointer; border: 1px solid var(--border-strong);
    background: var(--surface-2); color: var(--text); transition: all .15s;
  }
  .verify-btn:hover { border-color: var(--accent); color: var(--accent); }
  .verify-btn.yes { background: var(--success-dim); border-color: var(--success); color: var(--success); }
  .verify-btn.no { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }

  /* Solution steps */
  .solution-header {
    font-size: 15px; font-weight: 600; margin-bottom: 4px;
  }
  .solution-sub {
    font-size: 12px; color: var(--text-3); margin-bottom: 14px;
  }
  .step-list { list-style: none; }
  .step-row {
    display: flex; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .step-row:last-child { border-bottom: none; }
  .step-num {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); min-width: 20px; padding-top: 1px;
  }
  .step-text { font-size: 13px; line-height: 1.5; }

  /* No match */
  .no-match-box {
    text-align: center; padding: 20px;
  }
  .no-match-icon { font-size: 28px; margin-bottom: 8px; }
  .no-match-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .no-match-sub { font-size: 12px; color: var(--text-3); margin-bottom: 14px; }

  /* Archive */
  .archive-item {
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .archive-item:last-child { border-bottom: none; }
  .archive-time { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
  .archive-text {
    font-family: var(--mono); font-size: 12px;
    background: var(--surface-2); border-radius: 6px;
    padding: 8px 10px; margin: 6px 0;
    white-space: pre-wrap; word-break: break-word;
  }
  .archive-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .archive-tag {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: var(--surface-2); color: var(--text-3);
  }
  .archive-tag.matched { background: var(--success-dim); color: var(--success); }
  .archive-tag.unmatched { background: var(--danger-dim); color: var(--danger); }

  /* Library */
  .lib-item {
    display: flex; justify-content: space-between;
    align-items: flex-start; padding: 12px 0;
    border-bottom: 1px solid var(--border); gap: 12px;
  }
  .lib-item:last-child { border-bottom: none; }
  .lib-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .lib-code {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); margin-right: 6px;
  }
  .lib-pattern { font-size: 11px; color: var(--text-3); }

  /* Form */
  .field { margin-bottom: 12px; }
  .field label { font-size: 11px; color: var(--text-3); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--surface-2);
    border: 1px solid var(--border-strong); border-radius: 8px;
    padding: 8px 10px; font-size: 13px; color: var(--text);
    font-family: var(--font);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--accent);
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 32px;
    color: var(--text-3); font-size: 13px;
  }
  .empty-icon { font-size: 24px; margin-bottom: 8px; }

  /* Feedback */
  .feedback-row {
    display: flex; gap: 8px; align-items: center;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .feedback-label { font-size: 12px; color: var(--text-3); }
  .feedback-btn {
    padding: 5px 12px; border-radius: 6px; font-size: 12px;
    cursor: pointer; border: 1px solid var(--border-strong);
    background: none; color: var(--text-2); transition: all .15s;
  }
  .feedback-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>

<script>
const CATALOG_URL = "https://raw.githubusercontent.com/Ella-SD/ifs-error-catalog/main/IFS%20Error%20Catalog%20from%20API%20and%20SVC.csv";

// IFS version now lives on the company record (companies.ifs_version), set at
// onboarding and editable by a company_admin. Values match the onboarding dropdown.
const IFS_VERSION_OPTIONS = ["IFS10", "IFS Cloud", "IFS Apps 9", "Not sure"];
let ifsVersionSetting = null;

async function loadIfsVersionSetting() {
  // Platform admins have no company, so it stays null for them.
  ifsVersionSetting = company ? (company.ifs_version || null) : null;
}

async function saveIfsVersionSetting(v) {
  ifsVersionSetting = v;   // local; also called with null to re-open the picker
  if (v && company) {
    const { error } = await sb.from('companies').update({ ifs_version: v }).eq('id', company.id);
    if (error) console.error('saveIfsVersion', error);   // e.g. a company_member (not admin)
    else company.ifs_version = v;
  }
}

let catalog = [];       // full 53K error catalog in memory
let library = [];       // curated solutions
let archive = [];       // every submission
let currentImage = null;
let currentImageType = null;
let currentImageSrc = null;
let activityContext = '';

// ── CSV Parser ──────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split('\n');
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i]);
    if (vals.length < 5) continue;
    const row = {};
    headers.forEach((h, idx) => row[h.toUpperCase()] = (vals[idx] || '').replace(/^"|"$/g, '').trim());
    rows.push(row);
  }
  return rows;
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') {
      inQuotes = !inQuotes;
    } else if (line[i] === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += line[i];
    }
  }
  result.push(current);
  return result;
}

// ── JavaScript Matching Engine ───────────────────────────────

// Strip ALL dynamic parts from a text — :P1 :P2, numbers, IFS codes
function stripDynamic(text) {
  if (!text) return '';
  return text.toLowerCase()
    .replace(/:[a-z][0-9]*/gi, ' ')           // :P1 :P2 :P3
    .replace(/\b[a-z]{1,3}\d+[a-z0-9]*\b/gi, ' ') // R10047 B5501 NCR011101
    .replace(/\b\d+\b/g, ' ')                 // standalone numbers 1279514
    .replace(/[^a-z\s]/g, ' ')                // punctuation
    .replace(/\s+/g, ' ')
    .trim();
}

// Extract meaningful static words (length > 3, not common stop words)
const STOP_WORDS = new Set(['that','this','with','from','have','been','will','when',
  'they','them','your','what','also','into','more','than','some','only','such',
  'must','does','cannot','not','are','for','the','and','has','its','but']);

function getStaticWords(text) {
  return stripDynamic(text)
    .split(/\s+/)
    .filter(w => w.length > 3 && !STOP_WORDS.has(w));
}

function findCatalogMatches(extractedText, topN = 5) {
  if (!extractedText || catalog.length === 0) return [];

  const extractedWords = getStaticWords(extractedText);
  if (extractedWords.length === 0) return [];

  const scored = [];

  for (const row of catalog) {
    if (!row.ERROR_TEXT) continue;

    const catalogWords = getStaticWords(row.ERROR_TEXT);
    if (catalogWords.length === 0) continue;

    // Count how many extracted words appear in catalog template
    const hits = extractedWords.filter(w => catalogWords.includes(w)).length;
    if (hits === 0) continue;

    // Score = hits / max(extracted, catalog) — penalizes partial matches
    const score = hits / Math.max(extractedWords.length, catalogWords.length);
    if (score >= 0.4) scored.push({ row, score, matchType: 'static', hits });
  }

  return scored.sort((a, b) => b.score - a.score).slice(0, topN);
}

// ── Data layer (Supabase) ────────────────────────────────────
// Phase 2: the solution library and archive now live in Postgres behind RLS,
// not localStorage. (The old window.storage/localStorage fallback was removed.)

// Map a Supabase `solutions` row to the shape the existing UI expects.
function mapSolutionRow(r) {
  return {
    id: r.id,
    error_code: r.error_code,
    lu_name: r.lu_name || '',
    package_name: r.package_name || '',
    component_code: r.component_code || '',
    component_name: r.component_name || '',
    error_template: r.error_template || '',
    ifs_version: r.ifs_version || 'IFS10',
    title: r.title,
    who_acts: r.who_acts || '',
    status: r.status,
    source: r.source || 'ADMIN',
    reject_note: r.reject_note || '',
    times_served: r.times_served || 0,
    times_accepted: r.times_accepted || 0,
    times_rejected: r.times_rejected || 0,
    added_date: r.created_at,
    published_date: r.published_at,
    last_verified: r.last_verified,
    contributed_by_user_id: r.contributed_by_user_id || null,
    assembled_sources: r.assembled_sources || [],
    instructions: Array.isArray(r.instructions) ? r.instructions : []
  };
}

// Solution METADATA the end user is allowed to see — deliberately WITHOUT the
// `instructions` column. Steps are never bulk-loaded into the browser; an end
// user only ever receives them one resolution at a time through the gated
// reveal_solution RPC / unlock endpoint. Platform admins manage the library, so
// they load full rows (incl. steps) through the admin RPC, which also keeps
// working once migration 0010 locks the instructions column.
const SOLUTION_META_COLS = [
  'id', 'error_code', 'lu_name', 'package_name', 'component_code', 'component_name',
  'error_template', 'ifs_version', 'title', 'who_acts', 'status', 'source', 'reject_note',
  'times_served', 'times_accepted', 'times_rejected', 'created_at', 'published_at',
  'last_verified', 'contributed_by_user_id', 'assembled_sources', 'version'
].join(',');

async function loadLibrary() {
  if (isPlatformAdmin) {
    // Full rows incl. steps, for library management (SECURITY DEFINER, admin-gated).
    const { data, error } = await sb.rpc('admin_solutions_with_steps');
    if (error) { console.error('loadLibrary(admin)', error); library = []; return; }
    library = (data || []).map(mapSolutionRow);
    hydrateLibraryModules();
    return;
  }
  const { data, error } = await sb.from('solutions')
    .select(SOLUTION_META_COLS).order('created_at', { ascending: true });
  if (error) { console.error('loadLibrary', error); library = []; return; }
  library = (data || []).map(mapSolutionRow);   // instructions -> [] (not selected)
  hydrateLibraryModules();
}

// A solution exists to fix an error, so its component/module is a property of the
// ERROR — take it from the error's catalog entry (the source of truth), not from
// a hand-entered label on the solution. Overrides each solution's component_name
// with the catalog's by error code, so display + grouping always match the
// catalog. (Routing already derives the module the same way at escalation time.)
function hydrateLibraryModules() {
  if (!catalog || !catalog.length) return;   // catalog not loaded yet (first-boot race)
  library.forEach(l => { const m = catalogModuleFor(l.error_code); if (m) l.component_name = m; });
}

// Deprecated: writes now go straight to Supabase. Kept as a no-op so any missed
// caller doesn't throw; call loadLibrary() to refresh after a write.
async function saveLibrary() { /* no-op */ }

// Insert a new solution authored by the current user (RLS caps status at
// non-live, and stamps contributed_by = the caller).
async function insertSolution(fields) {
  const row = Object.assign({ contributed_by_user_id: authUser.id }, fields);
  // Return metadata only (never the instructions column) so this keeps working
  // once migration 0010 locks SELECT(instructions) for non-admins. Callers reload
  // via loadLibrary() and don't rely on the returned steps.
  const { data, error } = await sb.from('solutions').insert(row).select(SOLUTION_META_COLS).maybeSingle();
  if (error) throw error;
  return data ? mapSolutionRow(data) : null;
}


// Map a Supabase archive_entries row to the shape renderArchive expects.
// The catalog component is reconstructed from the client-side catalog by code.
function mapArchiveRow(r) {
  let catalog_match = null;
  if (r.catalog_match_error_code) {
    const cat = catalog.find(c => c.ERROR_CODE === r.catalog_match_error_code);
    catalog_match = { error_code: r.catalog_match_error_code, component: cat ? cat.COMPONENT_NAME : '', confidence: r.match_confidence || '' };
  }
  return {
    id: r.id,
    timestamp: r.created_at,
    error_text: r.error_text,
    screen_name: r.screen_name,
    ifs_version_hint: r.ifs_version_hint,
    activity: r.activity || null,
    catalog_match,
    lib_match: r.solution_id || null
  };
}

// Company-private archive — RLS scopes every row to the caller's company.
async function loadArchive() {
  const { data, error } = await sb.from('archive_entries').select('*').order('created_at', { ascending: false });
  if (error) { console.error('loadArchive', error); archive = []; }
  else archive = (data || []).map(mapArchiveRow);
  updateArchiveBadge();
}

// Deprecated: archive writes now go straight to Supabase. Kept as a no-op.
async function saveArchive() { updateArchiveBadge(); }

function updateArchiveBadge() {
  document.getElementById('archiveBadge').textContent = archive.length;
}

// ── Load Error Catalog from GitHub ───────────────────────────
async function loadCatalog() {
  const statusEl = document.getElementById('catalogStatus');
  const countEl = document.getElementById('catalogCount');
  try {
    statusEl.className = 'catalog-status loading';
    statusEl.textContent = 'Loading catalog...';
    const resp = await fetch(CATALOG_URL);
    if (!resp.ok) throw new Error('Failed to fetch');
    const text = await resp.text();
    catalog = parseCSV(text);
    statusEl.className = 'catalog-status';
    statusEl.textContent = `${catalog.length.toLocaleString()} errors loaded`;
    countEl.textContent = 'IFS 10 Error Catalog';
  } catch (e) {
    statusEl.className = 'catalog-status error';
    statusEl.textContent = 'Catalog unavailable';
    countEl.textContent = 'Working in offline mode';
  }
}

function renderVersionSettingCard() {

    return `
    <div class="card" id="versionSettingCard">
      <div class="card-title" style="margin-bottom:2px">Which IFS version does your company use?</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:10px">Asked once — we'll remember it. This catalog currently covers IFS 10 only, so this helps us tell you upfront if a mismatch is likely.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${IFS_VERSION_OPTIONS.map(v => `<button class="btn btn-ghost" data-set-version="${escHtml(v)}" style="font-size:12px">${escHtml(v)}</button>`).join('')}
      </div>
    </div>`;
  }
  const mismatch = ifsVersionSetting && ifsVersionSetting !== 'IFS10';
  return `
    <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-3);margin-bottom:14px">
      🏷️ IFS version: <b style="color:var(--text-2)">${escHtml(ifsVersionSetting)}</b>
      <button class="btn btn-ghost" id="changeVersionBtn" style="font-size:10px;padding:2px 7px">Change</button>
      ${mismatch ? `<span style="color:var(--warning)">⚠️ This catalog currently only covers IFS 10 — expect more "no match" results on ${escHtml(ifsVersionSetting)}.</span>` : ''}
    </div>`;
}

function wireVersionSettingCard(el) {
  el.querySelectorAll('[data-set-version]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await saveIfsVersionSetting(btn.dataset.setVersion);
      renderTroubleshoot();
    });
  });
  el.querySelector('#changeVersionBtn')?.addEventListener('click', async () => {
    await saveIfsVersionSetting(null);
    renderTroubleshoot();
  });
}

function renderTroubleshoot() {
  const el = document.getElementById('tab-troubleshoot');
  // Resolutions are the paid feature. No plan (and not a platform admin) → show plans.
  if (!isPlatformAdmin && !canResolve()) { renderUpgrade(el); return; }
  el.innerHTML = `
    ${renderVersionSettingCard()}
    <div class="card">
      <div class="card-title">Upload error screenshot</div>
      <label for="fileInput" id="dropzone" class="drop-zone" style="cursor:pointer;display:block">
        <div class="drop-icon">📸</div>
        <div class="drop-title">Click here to upload your IFS error screenshot</div>
        <div class="drop-sub">Tip: zoom in on the error dialog before screenshotting for best accuracy</div>
      </label>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg" style="display:none">
      <div id="previewSection" style="display:none;margin-top:12px">
        <img id="previewImg" style="max-width:100%;max-height:280px;border-radius:8px;border:1px solid #2e3148;display:block;margin:0 auto 14px">
        <div style="margin-bottom:10px">
          <div style="font-size:11px;color:#5c6494;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">What were you trying to do? (optional)</div>
          <input id="activityInput" placeholder="e.g. trying to delete a PO line, adding a new receipt..." style="width:100%;background:#222535;border:1px solid #3d4166;border-radius:8px;padding:8px 10px;font-size:13px;color:#e8eaf6;box-sizing:border-box">
        </div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button class="btn btn-primary" id="analyzeBtn">🔍 Analyze error</button>
          <button class="btn btn-ghost" id="clearBtn">Choose different image</button>
        </div>
      </div>
    </div>
    <div id="resultArea"></div>
  `;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const previewSection = document.getElementById('previewSection');
  const previewImg = document.getElementById('previewImg');

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  function handleFile(file) {
    currentImageSrc = URL.createObjectURL(file);
    previewImg.src = currentImageSrc;
    dropzone.style.display = 'none';
    previewSection.style.display = 'block';
    document.getElementById('resultArea').innerHTML = '';

    const reader = new FileReader();
    reader.onload = () => {
      currentImage = reader.result.split(',')[1];
      currentImageType = file.type || 'image/png';
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('clearBtn').addEventListener('click', () => {
    currentImage = null;
    currentImageSrc = null;
    dropzone.style.display = 'block';
    previewSection.style.display = 'none';
    previewImg.src = '';
    document.getElementById('resultArea').innerHTML = '';
    fileInput.value = '';
    const ai = document.getElementById('activityInput');
    if (ai) ai.value = '';
  });

  document.getElementById('analyzeBtn').addEventListener('click', analyzeError);
  wireVersionSettingCard(el);
}

async function analyzeError() {
  // Defense-in-depth: the UI hides this for unpaid users and the proxy enforces
  // it server-side, but guard here too.
  if (!isPlatformAdmin && !canResolve()) { renderTroubleshoot(); return; }
  const btn = document.getElementById('analyzeBtn');
  const resultArea = document.getElementById('resultArea');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Step 1: Reading error text...';
  resultArea.innerHTML = '';
  activityContext = document.getElementById('activityInput')?.value?.trim() || '';

  try {
    // STEP 1: Extract error text from screenshot (vision only, no catalog)
    const extractResp = await fetch('https://ifs-error-assistant-proxy.vercel.app/api/messages', {
      method: 'POST',
      headers: await authedHeaders(),
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: `You are an OCR specialist reading IFS ERP error screenshots.

FIRST, determine whether this image actually shows an IFS application with a visible error message or dialog. It might not be — it could be an unrelated photo, a blank/loading screen, a different application entirely, or a valid IFS screen with no error currently showing. If there is no genuine IFS error dialog visible, set "is_ifs_error" to false and "error_text" to null — do NOT invent or guess an error message that isn't actually there.

If there IS a visible IFS error dialog, your job is to extract the exact text from it.

RULES:
- Read ONLY text inside the error dialog/popup (purple/colored header with X icon)
- Transcribe EXACTLY — every word, abbreviation, code (W/D/R, ID, No, etc.)
- Also note: the screen/page title visible at the top of the IFS window
- Also look for any visible indication of the IFS version or environment — e.g. a version number in the browser tab/title bar, a build number, "IFS Cloud", "IFS Apps 9/10", or an environment banner. Only report this if you can actually see it; do not guess.
- Do NOT paraphrase or guess unclear words — write [unclear] instead
- Ignore all other screen content (menus, field labels, data)

Respond ONLY with raw JSON (no markdown):
{"is_ifs_error": true|false, "error_text": "exact error message verbatim, or null if is_ifs_error is false", "screen_name": "IFS screen title if visible", "dialog_title": "error dialog title", "ifs_version_hint": "version/environment text if visible on screen, otherwise null", "note_if_invalid": "one short sentence explaining what the image actually shows, only if is_ifs_error is false"}`,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentImageType, data: currentImage } },
            { type: 'text', text: `Extract the exact error text from this IFS screenshot.${activityContext ? ' The user was trying to: ' + activityContext : ''}` }
          ]
        }]
      })
    });

    const extractData = await extractResp.json();
    if (extractData.error) throw new Error(extractData.error.message);
    const textBlock = extractData.content.find(b => b.type === 'text');
    if (!textBlock) throw new Error('No response from model');

    let raw = textBlock.text.replace(/```json|```/g, '').trim();
    const fb = raw.indexOf('{'); const lb = raw.lastIndexOf('}');
    if (fb !== -1 && lb !== -1) raw = raw.slice(fb, lb + 1);
    let extracted;
    try { extracted = JSON.parse(raw); } catch { extracted = { error_text: textBlock.text }; }
    if (!extracted.error_text) extracted.error_text = '(no text detected)';

    // Bail out early if this isn't actually an IFS error screenshot — don't waste a
    // catalog match + confirmation call on a photo of a dog, a blank screen, etc.
    if (extracted.is_ifs_error === false) {
      resultArea.innerHTML = `
        <div class="card">
          <span class="match-badge none">🖼️ Doesn't look like an IFS error</span>
          <div style="font-size:13px;color:var(--text);margin:10px 0">
            ${escHtml(extracted.note_if_invalid || "This doesn't appear to show a visible IFS error message.")}
          </div>
          <div style="font-size:12px;color:var(--text-3);margin-bottom:14px">
            Try uploading a screenshot that includes the actual error dialog or message box.
          </div>
          <button class="btn btn-primary" id="tryAgainBtn">Try another screenshot</button>
        </div>`;
      document.getElementById('tryAgainBtn').addEventListener('click', () => document.getElementById('clearBtn').click());
      return;
    }

    // STEP 2: JavaScript catalog matching (no API call)
    btn.innerHTML = '<span class="spin"></span> Step 2: Searching catalog...';
    const catalogMatches = findCatalogMatches(extracted.error_text);

    // Debug: show matching info
    const catalogSample = catalog.slice(0, 2).map(r => r.ERROR_TEXT).join(' | ');
    const debugInfo = `Static words: [${getStaticWords(extracted.error_text).join(', ')}]\nCatalog size: ${catalog.length}\nCatalog sample: ${catalogSample}\nMatches found: ${catalogMatches.length}\nTop: ${catalogMatches[0] ? catalogMatches[0].row.ERROR_CODE + ' score:' + catalogMatches[0].score.toFixed(2) : 'none'}`;
    console.log(debugInfo);

    // STEP 3: Claude confirms best catalog match
    let confirmedMatch = null;
    if (catalogMatches.length > 0) {
      const confirmResp = await fetch('https://ifs-error-assistant-proxy.vercel.app/api/messages', {
        method: 'POST',
        headers: await authedHeaders(),
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 500,
          system: `You are matching an extracted IFS error message to its catalog entry.
Given the extracted error text and top candidate matches, pick the best match.
Respond ONLY with raw JSON: {"best_match_index": 0, "confidence": "high"|"medium"|"low"|"none", "reasoning": "one sentence"}`,
          messages: [{
            role: 'user',
            content: `Extracted error: "${extracted.error_text}"

Top catalog candidates:
${catalogMatches.map((m, i) => `${i}: [${m.row.ERROR_CODE}] ${m.row.ERROR_TEXT} (${m.row.COMPONENT_NAME})`).join('\n')}

Which candidate best matches the extracted error?`
          }]
        })
      });

      const confirmData = await confirmResp.json();
      if (!confirmData.error) {
        const confirmBlock = confirmData.content.find(b => b.type === 'text');
        if (confirmBlock) {
          let cr = confirmBlock.text.replace(/```json|```/g, '').trim();
          const cf = cr.indexOf('{'); const cl = cr.lastIndexOf('}');
          if (cf !== -1 && cl !== -1) cr = cr.slice(cf, cl + 1);
          try {
            const confirmed = JSON.parse(cr);
            if (confirmed.confidence !== 'none' && catalogMatches[confirmed.best_match_index]) {
              confirmedMatch = { ...catalogMatches[confirmed.best_match_index], confidence: confirmed.confidence };
            }
          } catch {}
        }
      }
    }

    // STEP 3: Check solution library using error_code from catalog match. Only
    // live rows (PUBLISHED / VERIFIED / NEEDS_REVIEW) are offered to end users. A
    // live status implies steps exist, so we no longer test instructions here —
    // end users don't load the steps at all (they arrive via the gated reveal).
    const libMatch = confirmedMatch
      ? library.find(l => l.error_code === confirmedMatch.row.ERROR_CODE && isLiveSolution(l))
      : library.find(l => isLiveSolution(l) && extracted.error_text.toLowerCase().includes(l.error_code.toLowerCase()));
    // (The serve is counted server-side when the steps are actually revealed.)

    // Archive the submission into the company-private archive_entries table.
    // (Skipped for a platform_admin, who has no company context.)
    if (profile && profile.company_id) {
      try {
        const { data: arcRow, error: arcErr } = await sb.from('archive_entries').insert({
          company_id: profile.company_id,
          submitted_by_user_id: authUser.id,
          error_text: extracted.error_text,
          screen_name: extracted.screen_name || null,
          ifs_version_hint: extracted.ifs_version_hint || null,
          catalog_match_error_code: confirmedMatch ? confirmedMatch.row.ERROR_CODE : null,
          match_confidence: confirmedMatch ? confirmedMatch.confidence : null,
          activity: activityContext || null,
          solution_id: libMatch ? libMatch.id : null
        }).select().maybeSingle();
        if (arcErr) console.error('archive insert', arcErr);
        else if (arcRow) { archive.unshift(mapArchiveRow(arcRow)); updateArchiveBadge(); }
      } catch (e) { console.error('archive insert', e); }
    }

    renderResult(extracted, confirmedMatch, libMatch, debugInfo);

    // Set screenshot in technical details after render
    setTimeout(() => {
      const techImg = document.getElementById('techScreenshot');
      if (techImg && currentImageSrc) techImg.src = currentImageSrc;
    }, 100);

  } catch (err) {
    resultArea.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">⚠️</div>${escHtml(err.message || 'Something went wrong')}</div></div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 Analyze error';
  }
}

// Plain-language match-confidence label (scope Part 5.5) — a paying user acts on
// "likely / possible" more easily than "high/medium confidence" or a percentage.
function confidenceLabel(conf) {
  return { high: 'Likely match', medium: 'Possible match', low: 'Low-confidence match' }[conf] || 'Catalog match';
}

// Version-mismatch banner (scope Part 3/8.6): IFS error text is a fixed Oracle
// string, so a weak/no match is usually a version mismatch, not a wording problem.
// Surface it explicitly when a non-IFS-10 version was detected on screen, rather
// than folding it silently into a generic "no match".
function versionMismatchBanner(hint) {
  if (!hint || /10\b/.test(hint)) return '';
  return `<div style="background:var(--warning-dim);border:1px solid var(--warning);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--warning)">⚠️ This looks like <b>${escHtml(hint)}</b>, but our catalog currently covers <b>IFS 10</b> only — that mismatch is the most likely reason for a weak or missing match, not necessarily a wrong error.</div>`;
}

function renderResult(extracted, catalogMatch, libMatch, debugInfo) {
  const resultArea = document.getElementById('resultArea');
  const debugHtml = debugInfo ? `<div style="font-family:var(--mono);font-size:11px;color:var(--text-3);background:var(--surface-2);border-radius:6px;padding:8px;margin-bottom:12px;white-space:pre">${escHtml(debugInfo)}</div>` : '';

  const extractedHtml = `
    <div class="extracted-label">
      Text read from screenshot
      <span class="saved-tag">✓ Archived</span>
    </div>
    <div class="extracted-box">${escHtml(extracted.error_text)}</div>
    ${extracted.screen_name ? `<div style="font-size:11px;color:var(--text-3);margin-bottom:4px">📍 Screen: <b style="color:var(--text-2)">${escHtml(extracted.screen_name)}</b></div>` : ''}
    ${extracted.ifs_version_hint ? `<div style="font-size:11px;color:var(--text-3);margin-bottom:4px">🏷️ Version/environment seen on screen: <b style="color:var(--text-2)">${escHtml(extracted.ifs_version_hint)}</b> <span style="color:var(--text-3)">(catalog only covers IFS 10)</span></div>` : ''}
    ${activityContext ? `<div style="font-size:11px;color:var(--text-3);margin-bottom:12px">🎯 User was trying to: <b style="color:var(--text-2)">${escHtml(activityContext)}</b></div>` : ''}
  `;

  // If we have a library solution — open a gated resolution. Subscribers/admin
  // see the steps immediately; PAYG users get the $4.99 preview→pay→reveal. The
  // steps themselves are fetched from the server, never from the client array.
  if (libMatch) {
    resultArea.innerHTML = `
      <div class="card">
        ${extractedHtml}
        <div id="resolveArea"></div>
        ${catalogMatch ? renderTechToggle(catalogMatch) : ''}
      </div>`;
    openResolution(libMatch, {
      error_code: libMatch.error_code,
      error_text: extracted.error_text,
      screen_name: extracted.screen_name || null,
      version_hint: extracted.ifs_version_hint || null,
      confidence: catalogMatch ? catalogMatch.confidence : 'high'
    }, document.getElementById('resolveArea'));
    return;
  }

  // Catalog match but no library solution yet
  if (catalogMatch && (catalogMatch.confidence === 'high' || catalogMatch.confidence === 'medium')) {
    resultArea.innerHTML = `
      <div class="card">
        <span class="match-badge ${catalogMatch.confidence}">⚡ ${confidenceLabel(catalogMatch.confidence)}</span>
        ${extractedHtml}
        ${renderVerification(catalogMatch)}
        <div style="margin-top:12px;font-size:13px;color:var(--warning)">
          ⚠️ No curated solution yet.
        </div>
        <div class="btn-row" style="margin-top:12px">
          <button class="btn btn-primary" id="assembleBtn">🪄 Search docs &amp; assemble a fix</button>
          ${isPlatformAdmin ? `<button class="btn btn-ghost" onclick="switchToAddSolution('${escHtml(catalogMatch.row.ERROR_CODE)}', '${escHtml(catalogMatch.row.COMPONENT_NAME)}')">+ Add solution manually</button>` : ''}
        </div>
        <div id="assembledArea" style="margin-top:12px"></div>
        ${renderTechToggle(catalogMatch)}
      </div>`;
    const abtn = document.getElementById('assembleBtn');
    abtn.addEventListener('click', () => generateAssembledAnswer(catalogMatch.row, abtn, document.getElementById('assembledArea'),
      { gated: true, ctx: { error_text: extracted.error_text, screen_name: extracted.screen_name, version_hint: extracted.ifs_version_hint, confidence: catalogMatch.confidence } }));
    return;
  }

  // Low-confidence catalog candidate — a real candidate exists, Claude just isn't sure.
  // Worth showing for manual verification rather than discarding it like a true no-match.
  if (catalogMatch && catalogMatch.confidence === 'low') {
    resultArea.innerHTML = `
      <div class="card">
        <span class="match-badge low">❓ Possible match — low confidence, please verify</span>
        ${versionMismatchBanner(extracted.ifs_version_hint)}
        ${extractedHtml}
        ${renderVerification(catalogMatch)}
        <div style="margin-top:12px;font-size:13px;color:var(--text-3)">
          This is the closest candidate found, but it's not a confident match. Since IFS error text is a fixed system string (not user-typed), a mismatch like this is usually because the screenshot is from a different IFS version than this catalog (IFS 10 only) — double-check the version before assuming the text itself is wrong.
        </div>
        ${libMatch ? '' : `
        <div class="btn-row" style="margin-top:12px">
          <button class="btn btn-primary" id="assembleBtn">🪄 Search docs &amp; assemble a fix</button>
          ${isPlatformAdmin ? `<button class="btn btn-ghost" onclick="switchToAddSolution('${escHtml(catalogMatch.row.ERROR_CODE)}', '${escHtml(catalogMatch.row.COMPONENT_NAME)}')">+ Add solution manually</button>` : ''}
        </div>
        <div id="assembledArea" style="margin-top:12px"></div>`}
        ${renderTechToggle(catalogMatch)}
      </div>`;
    const abtn = document.getElementById('assembleBtn');
    abtn?.addEventListener('click', () => generateAssembledAnswer(catalogMatch.row, abtn, document.getElementById('assembledArea'),
      { gated: true, ctx: { error_text: extracted.error_text, screen_name: extracted.screen_name, version_hint: extracted.ifs_version_hint, confidence: catalogMatch.confidence } }));
    return;
  }

  // No match at all — still worth doing something with the raw extracted text rather
  // than dead-ending, since that's often an OCR/wording issue rather than a genuinely
  // uncataloged error.
  resultArea.innerHTML = `
    <div class="card">
      <span class="match-badge none">✗ No match found</span>
      ${versionMismatchBanner(extracted.ifs_version_hint)}
      ${extractedHtml}
      <div class="no-match-box">
        <div class="no-match-icon">🔎</div>
        <div class="no-match-title">This text didn't match anything in the catalog</div>
        <div class="no-match-sub">Since IFS error text is a fixed system string, this most likely means the screenshot is from a different IFS version than this catalog covers (IFS 10 only) — check the version above if one was detected. Less commonly, it could be an OCR misread or a genuinely uncataloged error. A couple of things you can still try:</div>
        <div class="btn-row" style="margin-top:10px;justify-content:center;flex-wrap:wrap">
          ${extracted.error_text ? `<button class="btn btn-primary" id="assembleRawBtn">🪄 Search docs &amp; assemble a fix</button>` : ''}
          ${extracted.error_text ? `<button class="btn btn-ghost" id="askChatBtn">💬 Ask about this in chat</button>` : ''}
          ${isPlatformAdmin ? `<button class="btn btn-ghost" onclick="switchToAddSolution('', '')">+ Add to library manually</button>` : ''}
        </div>
        <div id="assembledArea" style="margin-top:12px;text-align:left"></div>
      </div>
    </div>`;

  const assembleRawBtn = document.getElementById('assembleRawBtn');
  if (assembleRawBtn) {
    assembleRawBtn.addEventListener('click', () => {
      const pseudoRow = {
        ERROR_CODE: 'UNCATALOGED_' + Date.now(),
        LU_NAME: '', PACKAGE_NAME: '', COMPONENT_CODE: '',
        COMPONENT_NAME: extracted.screen_name || '',
        ERROR_TEXT: extracted.error_text,
        IFS_VERSION: 'IFS10'
      };
      generateAssembledAnswer(pseudoRow, assembleRawBtn, document.getElementById('assembledArea'),
        { gated: true, ctx: { error_text: extracted.error_text, screen_name: extracted.screen_name, version_hint: extracted.ifs_version_hint, confidence: null } });
    });
  }

  document.getElementById('askChatBtn')?.addEventListener('click', () => {
    document.querySelector('[data-tab="chatbot"]').click();
    setTimeout(() => {
      const input = document.getElementById('chatInput');
      if (input) {
        input.value = `I got this error in IFS and it's not in your catalog: "${extracted.error_text}"${extracted.screen_name ? ` (on the ${extracted.screen_name} screen)` : ''}. What might be causing it and how would I typically resolve it?`;
        sendChatMessage();
      }
    }, 50);
  });
}

// ── GATED RESOLUTION REVEAL ────────────────────────────────────
// The single path by which any solution's steps reach the user. Given a matched
// live solution (metadata only) + match context, it opens a resolution record,
// then either reveals the steps for free (subscriber / platform admin) or shows
// the $4.99 preview→pay gate (PAYG). Steps are always fetched from the server —
// reveal_solution (subscribers) or /api/billing/unlock (PAYG) — never read from
// the client. Post-reveal thumbs feed record_outcome (accept / refund signal).
// opts.payMode: 'direct' → a PAYG user charges immediately (used by Search/Browse,
// where the card already served as the priced preview, so the extra paywall panel
// would just be a second identical click). Default shows the paywall panel first
// (used by Troubleshoot, where this IS the first preview of the match).
async function openResolution(sol, ctx, container, opts) {
  if (!container) return;
  opts = opts || {};
  container.innerHTML = `<div style="font-size:12px;color:var(--text-3)"><span class="spin"></span> Checking your access…</div>`;
  let resolutionId;
  try {
    const { data, error } = await sb.rpc('start_resolution', {
      p_error_code: ctx.error_code || sol.error_code || null,
      p_error_text: ctx.error_text || null,
      p_screen_name: ctx.screen_name || null,
      p_version_hint: ctx.version_hint || null,
      p_match_confidence: ctx.confidence || null,
      p_solution_id: sol.id
    });
    if (error) throw error;
    resolutionId = data;
  } catch (e) {
    container.innerHTML = `<div style="font-size:12px;color:var(--danger)">Couldn't start this resolution: ${escHtml(e.message || 'unknown error')}</div>`;
    return;
  }

  // Display price: assemble_price for an unreviewed AI fix, else the match price.
  // (The server independently picks the same key by status when it charges.)
  const priceCents = opts.priceCents || paygPriceCents;

  if (hasActiveSub || isPlatformAdmin) {
    await revealFree(resolutionId, sol, container);
  } else if (paygReady) {
    if (opts.payMode === 'direct') chargeAndReveal(resolutionId, sol, container, priceCents);
    else renderPaywall(resolutionId, sol, container, priceCents);
  } else {
    renderNeedPlan(container);
  }
}

// Subscriber / admin: free reveal via the SECURITY DEFINER RPC.
async function revealFree(resolutionId, sol, container) {
  container.innerHTML = `<div style="font-size:12px;color:var(--text-3)"><span class="spin"></span> Loading the fix…</div>`;
  try {
    const { data, error } = await sb.rpc('reveal_solution', { p_resolution_id: resolutionId });
    if (error) throw error;
    renderRevealedSteps(container, data, resolutionId, sol);
  } catch (e) {
    container.innerHTML = `<div style="font-size:12px;color:var(--danger)">Couldn't load the fix: ${escHtml(e.message || 'unknown error')}</div>`;
  }
}

function priceStr() { return priceStrOf(paygPriceCents); }
function priceStrOf(cents) { return '$' + ((cents || 0) / 100).toFixed(2); }

// PAYG: preview (found + confidence + price) with the steps hidden until paid.
// priceCents is for DISPLAY only; the server re-derives the real charge by status.
function renderPaywall(resolutionId, sol, container, priceCents) {
  priceCents = priceCents || paygPriceCents;
  const unreviewed = !isLiveSolution(sol);   // AI-assembled fix, not yet human-reviewed
  const badge = unreviewed
    ? `<span class="match-badge medium">🪄 AI-assembled fix ready</span>`
    : `<span class="match-badge high">✓ Solution found</span>`;
  const readyLine = unreviewed
    ? 'A step-by-step fix, freshly researched by AI for this error.'
    : 'The step-by-step fix is ready.';
  container.innerHTML = `
    ${badge}
    <div class="solution-header">${escHtml(sol.title)}</div>
    <div class="solution-sub">📦 ${escHtml(sol.component_name || sol.component || '—')} &nbsp;·&nbsp; 👤 ${escHtml(sol.who_acts || '—')}</div>
    <div style="background:var(--surface-2);border:1px dashed var(--border-strong);border-radius:8px;padding:14px;margin-top:10px;text-align:center">
      <div style="font-size:22px;margin-bottom:4px">🔒</div>
      <div style="font-size:13px;color:var(--text-2);margin-bottom:2px">${readyLine}</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:12px">Unlock to view it here, and to download it. One-time charge — no subscription.</div>
      <button class="btn btn-primary" id="unlockBtn_${resolutionId}">🔓 Unlock the fix for ${priceStrOf(priceCents)}</button>
      <div id="unlockErr_${resolutionId}" style="font-size:11px;color:var(--danger);margin-top:8px"></div>
    </div>`;
  document.getElementById('unlockBtn_' + resolutionId)
    .addEventListener('click', () => chargeAndReveal(resolutionId, sol, container, priceCents));
}

// Charge the saved card once and reveal. The endpoint is idempotent per
// resolution, so a retried click never double-charges. On failure we fall back to
// the paywall panel (with a retry button) and surface the error there.
async function chargeAndReveal(resolutionId, sol, container, priceCents) {
  priceCents = priceCents || paygPriceCents;
  container.innerHTML = `<div style="font-size:12px;color:var(--text-3);padding:6px 0"><span class="spin"></span> Charging ${priceStrOf(priceCents)}…</div>`;
  try {
    const resp = await fetch(`${BILLING_BASE}/unlock`, {
      method: 'POST', headers: await authedHeaders(),
      body: JSON.stringify({ resolution_id: resolutionId })
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error((data.error && data.error.message) || 'Unlock failed');
    renderRevealedSteps(container, data, resolutionId, sol);
  } catch (e) {
    renderPaywall(resolutionId, sol, container, priceCents);
    const errEl = document.getElementById('unlockErr_' + resolutionId);
    if (errEl) errEl.textContent = e.message || 'Unlock failed';
  }
}

// Render the revealed steps + download + post-reveal thumbs.
function renderRevealedSteps(container, payload, resolutionId, sol) {
  const steps = Array.isArray(payload.steps) ? payload.steps : [];
  const title = payload.title || (sol && sol.title) || 'Solution';
  const who = payload.who_acts || (sol && sol.who_acts) || '—';
  const unreviewed = sol && !isLiveSolution(sol);   // AI-assembled, not human-reviewed
  container.innerHTML = `
    <span class="match-badge ${unreviewed ? 'medium">🪄 AI-assembled fix' : 'high">✓ Solution'}</span>
    <div class="solution-header">${escHtml(title)}</div>
    <div class="solution-sub">👤 ${escHtml(who)}</div>
    <ul class="step-list">
      ${steps.map((s, i) => `
        <li class="step-row">
          <span class="step-num">${i + 1}.</span>
          <span class="step-text">${escHtml(s)}</span>
        </li>`).join('')}
    </ul>
    ${unreviewed ? `<div style="font-size:11px;color:var(--warning);margin-top:6px">⚠️ Freshly assembled by AI and not yet human-verified — please tell us below whether it worked.</div>` : ''}
    ${payload.charged_cents ? `<div style="font-size:11px;color:var(--success);margin-top:2px">✓ Charged $${(payload.charged_cents / 100).toFixed(2)}</div>` : ''}
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-ghost" style="font-size:12px" id="dlBtn_${resolutionId}">⬇ Download steps</button>
    </div>
    <div class="feedback-row">
      <span class="feedback-label">Did this solve your issue?</span>
      <button class="feedback-btn" id="upBtn_${resolutionId}">✓ Yes</button>
      <button class="feedback-btn" id="downBtn_${resolutionId}">✗ No</button>
    </div>`;
  // Refundable = this resolution was actually charged (PAYG / assemble). A
  // subscriber's reveal has no charge, so there's nothing to refund — the promise
  // wording adapts accordingly.
  const refundable = !!payload.charged_cents;
  document.getElementById('dlBtn_' + resolutionId)
    .addEventListener('click', () => downloadSteps(title, who, steps));
  document.getElementById('upBtn_' + resolutionId)
    .addEventListener('click', (e) => recordResolutionOutcome(resolutionId, true, e.currentTarget));
  document.getElementById('downBtn_' + resolutionId)
    .addEventListener('click', (e) => showEscalationForm(resolutionId, refundable, e.currentTarget.closest('.feedback-row'), sol && sol.error_code));
}

// The canonical module for an error = the catalog's component for that error code.
function catalogModuleFor(errorCode) {
  if (!errorCode) return null;
  const row = catalog.find(r => r.ERROR_CODE === errorCode);
  return row ? row.COMPONENT_NAME : null;
}

// 👎 path: capture optional context, show the consent note, then escalate.
function showEscalationForm(resolutionId, refundable, rowEl, errorCode) {
  if (!rowEl) return;
  rowEl.innerHTML = `
    <div style="flex:1">
      <div style="font-size:12px;color:var(--text-2);margin-bottom:6px">Sorry that didn't solve it. A specialist can review this for you.</div>
      <textarea id="escCtx_${resolutionId}" rows="2" placeholder="Optional: what were you trying to do / what went wrong? (helps the specialist)"
        style="width:100%;box-sizing:border-box;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);font-family:inherit"></textarea>
      <div style="font-size:11px;color:var(--text-3);margin:6px 0 8px">🔒 By requesting a review, a specialist will see this error to help resolve it.</div>
      <button class="btn btn-primary" style="font-size:12px" id="escBtn_${resolutionId}">Request a review</button>
      <div id="escErr_${resolutionId}" style="font-size:11px;color:var(--danger);margin-top:6px"></div>
    </div>`;
  document.getElementById('escBtn_' + resolutionId)
    .addEventListener('click', (e) => submitEscalation(resolutionId, refundable, e.currentTarget, rowEl, errorCode));
}

async function submitEscalation(resolutionId, refundable, btn, rowEl, errorCode) {
  const ctx = (document.getElementById('escCtx_' + resolutionId)?.value || '').trim();
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Submitting…';
  const { error } = await sb.rpc('escalate_resolution', { p_resolution_id: resolutionId, p_context: ctx, p_module: catalogModuleFor(errorCode) });
  if (error) {
    btn.disabled = false; btn.innerHTML = 'Request a review';
    const errEl = document.getElementById('escErr_' + resolutionId);
    if (errEl) errEl.textContent = error.message || 'Could not submit — try again.';
    return;
  }
  rowEl.innerHTML = `<span style="font-size:12px;color:var(--success)">✓ Escalated. A specialist will review this — ${refundable ? "you'll get a verified fix or a full refund." : "we'll get you a verified fix."}</span>`;
}

// ── ADMIN ESCALATIONS QUEUE ────────────────────────────────────
function escAgeDays(ts) {
  return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
}

async function refreshEscalationBadge() {
  try {
    const { data } = await sb.rpc('admin_escalations');
    const openCount = (data || []).filter(r => r.state === 'escalated').length;
    const badge = document.getElementById('escBadge');
    if (badge) { badge.textContent = openCount; badge.style.display = openCount > 0 ? '' : 'none'; }
  } catch {}
}

async function renderEscalations() {
  const el = document.getElementById('tab-escalations');
  if (!isPlatformAdmin) { el.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">🔒</div>Admin only.</div></div>`; return; }

  const { data, error } = await sb.rpc('admin_escalations');
  if (error) { el.innerHTML = `<div class="card"><div class="empty">Couldn't load escalations: ${escHtml(error.message || '')}</div></div>`; return; }
  const rows = data || [];
  const open = rows.filter(r => r.state === 'escalated');
  const closed = rows.filter(r => r.state !== 'escalated');
  const stripeBase = 'https://dashboard.stripe.com/test/payments/';   // test mode

  const card = (r) => {
    const days = escAgeDays(r.updated_at);
    const overdue = r.state === 'escalated' && days >= escalationSlaDays;
    const refundable = (r.price_cents || 0) > 0;
    const stateLabel = { escalated: 'Open', resolved_by_consultant: 'Resolved', refunded: 'Refunded' }[r.state] || r.state;
    const stateColor = r.state === 'escalated' ? (overdue ? 'var(--danger)' : 'var(--warning)') : 'var(--success)';
    return `
    <div style="border-bottom:1px solid var(--border);padding:12px 0">
      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:4px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--surface-2);color:${stateColor}">${stateLabel}${overdue ? ' · OVERDUE' : ''}</span>
          <span class="lib-code">${escHtml(r.error_code || '—')}</span>
          <span style="font-size:11px;color:var(--text-3)">${days}d ago</span>
        </div>
        <span style="font-size:11px;color:var(--text-3)">${escHtml(r.user_email || '')}</span>
      </div>
      ${r.error_text ? `<div style="font-size:12px;color:var(--text);margin-bottom:4px">${escHtml(r.error_text)}</div>` : ''}
      <div style="font-size:11px;color:var(--text-3);display:flex;gap:12px;flex-wrap:wrap">
        ${r.screen_name ? `<span>📍 ${escHtml(r.screen_name)}</span>` : ''}
        ${r.solution_title ? `<span>🧩 Failed fix: ${escHtml(r.solution_title)}</span>` : ''}
        <span>${refundable
          ? '💳 Paid $' + (r.price_cents / 100).toFixed(2) + (r.stripe_payment_intent ? ` · <a href="${stripeBase}${escHtml(r.stripe_payment_intent)}" target="_blank" rel="noopener" style="color:var(--accent)">open in Stripe</a>` : '')
          : '🔄 Subscriber (no charge — verified fix only)'}</span>
      </div>
      ${r.activity
        ? `<div style="font-size:11px;color:var(--text-2);margin-top:6px;background:var(--surface-2);border-radius:6px;padding:8px">🗣️ ${escHtml(r.activity)}</div>`
        : `<div style="font-size:11px;color:var(--text-3);margin-top:6px">(no context provided)</div>`}
      ${r.state === 'escalated' ? `
      <div class="btn-row" style="margin-top:8px">
        <button class="btn btn-primary" style="font-size:11px;padding:4px 9px;background:var(--success)" data-esc-resolve="${r.id}">✓ Mark resolved (fix delivered)</button>
        ${refundable ? `<button class="btn btn-ghost" style="font-size:11px;padding:4px 9px" data-esc-refund="${r.id}">↩ Mark refunded</button>` : ''}
      </div>` : ''}
    </div>`;
  };

  el.innerHTML = `
    <div class="card">
      <div class="card-title" style="margin-bottom:2px">Escalations</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:12px">Rejected fixes awaiting review. Deliver a verified fix then mark resolved, or refund in Stripe then mark refunded. "Overdue" = older than ${escalationSlaDays} days (a flag only — nothing is automatic).</div>
      ${open.length ? open.map(card).join('') : `<div class="empty" style="padding:20px">✓ No open escalations.</div>`}
    </div>

async function loadConsultantProfile() {

async function loadNotifications() {

// Notifications bell (rendered into the user bar).
function renderNotifBell() {
  const bar = document.getElementById('authUserBar');
  if (!bar) return;
  let bell = document.getElementById('notifBell');
  if (!bell) {
    bell = document.createElement('span');
    bell.id = 'notifBell';
    bell.style.cssText = 'position:relative;cursor:pointer;font-size:15px;margin-right:4px';
    bar.insertBefore(bell, bar.firstChild);
  }
  const unread = notifs.filter(n => !n.read_at).length;
  bell.innerHTML = `🔔${unread ? `<span style="position:absolute;top:-7px;right:-9px;background:var(--danger);color:#fff;border-radius:999px;font-size:9px;padding:0 4px">${unread}</span>` : ''}`;
  bell.onclick = toggleNotifPanel;
}

function toggleNotifPanel() {
  const existing = document.getElementById('notifPanel');
  if (existing) { existing.remove(); return; }
  const panel = document.createElement('div');
  panel.id = 'notifPanel';
  panel.style.cssText = 'position:fixed;top:52px;right:14px;width:320px;max-height:60vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.45);z-index:1000;padding:6px';
  panel.innerHTML = notifs.length ? notifs.map(n => `
    <div style="padding:8px;border-bottom:1px solid var(--border);${n.read_at ? '' : 'background:var(--surface-2)'}">
      <div style="font-size:12px;font-weight:600">${escHtml(n.title)}</div>
      <div style="font-size:11px;color:var(--text-3)">${escHtml(n.body || '')}</div>
    </div>`).join('') : '<div style="padding:16px;text-align:center;color:var(--text-3);font-size:12px">No notifications</div>';
  document.body.appendChild(panel);
  const unreadIds = notifs.filter(n => !n.read_at).map(n => n.id);
  if (unreadIds.length) {
    sb.rpc('mark_notifications_read', { p_ids: unreadIds }).then(() => {
      const now = new Date().toISOString();
      notifs.forEach(n => { if (unreadIds.includes(n.id)) n.read_at = now; });
      renderNotifBell();
    });
  }
}

function wireConsultantActions(el) {
  const emb = el.querySelector('#editModulesBtn');
  if (emb) emb.addEventListener('click', editConsultantModules);
  const cob = el.querySelector('#cashoutBtn');
  if (cob) cob.addEventListener('click', async () => {

    cob.disabled = true; cob.textContent = 'Requesting…';

    await loadConsultantProfile(); renderConsultant();
  });
  el.querySelectorAll('[data-accept]').forEach(b => b.addEventListener('click', async () => {
    b.disabled = true; b.textContent = 'Accepting…';
    const { error } = await sb.rpc('accept_job', { p_job_id: b.dataset.accept });
    if (error) { document.getElementById('jobMsg_' + b.dataset.accept).textContent = error.message; b.disabled = false; return; }
    renderConsultant();
  }));
  el.querySelectorAll('[data-submitform]').forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.submitform;
    const box = document.getElementById('submit_' + id);
    box.innerHTML = `
      <input id="subTitle_${id}" placeholder="Short title for the fix" style="width:100%;box-sizing:border-box;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:8px;padding:8px;font-size:12px;color:var(--text);margin-bottom:6px">

      <textarea id="subSteps_${id}" rows="5" placeholder="Fix steps — one per line" style="width:100%;box-sizing:border-box;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:8px;padding:8px;font-size:12px;color:var(--text);font-family:inherit"></textarea>
      <button class="btn btn-primary" style="font-size:12px;margin-top:6px" data-dosubmit="${id}">Submit for review</button>
      <div id="subErr_${id}" style="font-size:11px;color:var(--danger);margin-top:4px"></div>`;
    box.querySelector('[data-dosubmit]').addEventListener('click', async (e) => {

      e.currentTarget.disabled = true; e.currentTarget.textContent = 'Submitting…';

      renderConsultant();
    });
  }));
}

// ── TIER 2 — ASSEMBLED ANSWER ──────────────────────────────────
// Searches IFS docs / community / general web via the API's server-side web_search
// tool, has Claude write original step-by-step instructions, and saves the result
// into the library as an unverified AI-sourced draft pending admin review.
// opts.gated (end-user path): after assembling, route the reveal through the paid
// gate (subscribers/admin free, PAYG pays assemble_price) instead of showing the
// steps for free. opts.ctx carries the resolution context. Without opts.gated
// (admin library-seeding path) the assembled steps render inline as before.
// Tolerant parse of the model's assembled answer: try the JSON object, and if
// that's truncated/malformed (common after web search eats the token budget),
// recover the "steps" array directly. Returns null if nothing usable is found.
function parseAssembled(text) {
  const raw = (text || '').replace(/```json|```/g, '').trim();
  const open = raw.lastIndexOf('{'), close = raw.lastIndexOf('}');
  if (open !== -1 && close > open) {
    try { return JSON.parse(raw.slice(open, close + 1)); } catch {}
  }
  const m = raw.match(/"steps"\s*:\s*\[([\s\S]*?)\]/);
  if (m) {
    try {
      const steps = JSON.parse('[' + m[1] + ']');
      const t = raw.match(/"title"\s*:\s*"([^"]*)"/);
      const w = raw.match(/"who_acts"\s*:\s*"([^"]*)"/);
      return { title: t && t[1], who_acts: w && w[1], steps, sources: [] };
    } catch {}
  }
  return null;
}

// Honest "we couldn't assemble a confident fix" state — no solution, no charge.
function renderAssembleHolding(targetEl) {
  targetEl.innerHTML = `
    <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:12px">
      <div style="font-size:13px;color:var(--text-2);margin-bottom:4px">🤔 No confident fix yet</div>
      <div style="font-size:12px;color:var(--text-3)">We couldn't put together a reliable step-by-step fix for this exact error right now — so you haven't been charged. Try again in a moment, or ask the assistant for general guidance.</div>
    </div>`;
}

async function generateAssembledAnswer(catalogRow, btn, targetEl, opts) {
  opts = opts || {};
  const originalLabel = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Searching IFS docs & community...';
  targetEl.innerHTML = '';

  try {
    const resp = await fetch('https://ifs-error-assistant-proxy.vercel.app/api/messages', {
      method: 'POST',
      headers: await authedHeaders(),
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,   // headroom so the final JSON isn't truncated after web search
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `You are an IFS ERP support specialist assembling a first-response fix for a specific error, for an end user who is not a developer and does not have database access.

Use web search to check IFS documentation (docs.ifs.com), the IFS community forum (community.ifs.com), and any other reputable sources for how end users typically resolve THIS specific error. Stay strictly on the exact error text given — do not answer a different or more common error. If you cannot find a reasonably specific way an end user resolves this exact error, return an empty "steps" array rather than inventing a generic or unrelated fix.

Write the fix IN YOUR OWN WORDS — do not quote sources verbatim. Steps should be actions a business user can take inside the IFS application (which screen to go to, what to change, who to contact if it needs an admin). If you are not confident in a specific fix, say so plainly in a step rather than guessing.

STEP FORMAT — every step must follow this exact style, matching how existing solutions in this library are written:
- One short, plain sentence per step — a single concrete action, not a paragraph.
- No headers, labels, or ALL-CAPS prefixes (do NOT write things like "UNDERSTAND THE CAUSE:" or "STEP 1:" — the app numbers steps automatically).
- No explanatory preamble bundled into the step — if background is genuinely needed, fold it into one brief clause, not a separate lecture.
- If one action naturally has multiple parts, split it into separate steps rather than one long combined sentence.
- Aim for roughly 5-8 words to 25 words per step. If a step is running long, split it.

Example of the exact style to match, for a different error:
["Open the Purchase Order and check the current status — it must be Confirmed.", "To delete a PO line, first change the PO status back to Planned by clicking the Plan button.", "Once the status is Planned, select the line you want to delete and click Delete.", "If you cannot change the status, contact your Procurement Admin — the PO may be locked for approval."]

When you are done researching, respond with ONLY a raw JSON object as your final output (no markdown fences, no text after it), in exactly this shape:
{"title": "short plain-English title for this error", "who_acts": "role who typically resolves this, e.g. Buyer / Finance Team / IT Admin", "steps": ["step one", "step two", "..."], "sources": ["https://...", "https://..."]}`,
        messages: [{
          role: 'user',
          content: `Error code: ${catalogRow.ERROR_CODE}
Error message template: ${catalogRow.ERROR_TEXT}
IFS module: ${catalogRow.COMPONENT_NAME}
Package: ${catalogRow.PACKAGE_NAME}
IFS version: ${catalogRow.IFS_VERSION}

Research and assemble a step-by-step fix for this error.`
        }]
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);

    const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text);
    const parsed = parseAssembled(textBlocks.join('\n'));
    const normalizedSteps = parsed ? normalizeStepList(parsed.steps) : [];
    // Honest holding state (scope Part 5.3): if the model couldn't produce a
    // confident fix — or its JSON came back unparseable/truncated — don't invent
    // one, don't create a solution, and (importantly) don't charge. Show a plain
    // "no confident fix" message instead of a dead-end error.
    if (normalizedSteps.length === 0) {
      renderAssembleHolding(targetEl, opts);
      return;
    }

    // Save as a new AI-assembled draft pending admin review, owned by this user.
    // Under the shared model we always insert a fresh pending row rather than
    // editing a shared seed the user doesn't own.
    let newSol = null;
    try {
      newSol = await insertSolution({
        error_code: catalogRow.ERROR_CODE,
        lu_name: catalogRow.LU_NAME || null,
        package_name: catalogRow.PACKAGE_NAME || null,
        component_code: catalogRow.COMPONENT_CODE || null,
        component_name: catalogRow.COMPONENT_NAME || null,
        error_template: catalogRow.ERROR_TEXT || null,
        ifs_version: catalogRow.IFS_VERSION || 'IFS10',
        title: parsed.title || `Fix for ${catalogRow.ERROR_CODE}`,
        who_acts: parsed.who_acts || null,
        source: 'AI',
        status: 'PENDING_REVIEW',
        instructions: normalizedSteps,
        assembled_sources: parsed.sources || []
      });
      await loadLibrary();
    } catch (e) { console.error('assemble save', e); }

    // End-user path: the assembled fix is a paid resolution — gate the reveal at
    // assemble_price (subscribers/admin see it free) rather than showing it free.
    if (opts.gated && newSol) {
      btn.style.display = 'none';   // the gated reveal takes over this area
      openResolution(newSol, opts.ctx || {}, targetEl, { priceCents: assemblePriceCents });
      return;
    }

    // Admin / library-seeding path: show the assembled steps inline.
    targetEl.innerHTML = `
      <div style="background:var(--surface-2);border:1px solid var(--accent-dim);border-radius:8px;padding:12px">
        <span class="match-badge medium" style="margin-bottom:8px;display:inline-block">🪄 AI-assembled — pending review</span>
        <div class="solution-header">${escHtml(parsed.title || ('Fix for ' + catalogRow.ERROR_CODE))}</div>
        <div class="solution-sub">👤 ${escHtml(parsed.who_acts || '—')}</div>
        <ul class="step-list">
          ${normalizedSteps.map((s, i) => `
            <li class="step-row">
              <span class="step-num">${i + 1}.</span>
              <span class="step-text">${escHtml(s)}</span>
            </li>`).join('')}
        </ul>
        ${(parsed.sources && parsed.sources.length > 0) ? `
          <div style="font-size:11px;color:var(--text-3);margin-top:10px">
            Sources checked: ${parsed.sources.map(u => `<a href="${escHtml(u)}" target="_blank" rel="noopener" style="color:var(--accent)">${escHtml(u)}</a>`).join(' · ')}
          </div>` : ''}
        <div style="font-size:11px;color:var(--warning);margin-top:8px">⚠️ Not yet verified by a human. Saved to the Solution library under "Pending review" — approve it there before it's shown automatically to other users.</div>
      </div>`;
  } catch (err) {
    targetEl.innerHTML = `<div style="font-size:12px;color:var(--danger)">⚠️ Couldn't assemble a solution: ${escHtml(err.message || 'unknown error')}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalLabel;
  }
}

    if (!title || steps.length === 0) return;

    try {
      const existing = editId ? library.find(l => l.id === editId) : null;
      const ownedEditable = existing && existing.contributed_by_user_id === authUser.id
        && ['DRAFT', 'REJECTED', 'NO_INSTRUCTION'].includes(existing.status);
      if (ownedEditable) {
        const { error } = await sb.from('solutions').update({
          instructions: steps, who_acts: who, title, source, status: 'DRAFT', reject_note: ''
        }).eq('id', editId);
        if (error) throw error;
      } else {
        // New solution, or "add steps" to a shared/seed row the user can't edit:
        // create a fresh owned draft, carrying catalog metadata where available.
        const meta = existing ? null : catalog.find(r => r.ERROR_CODE === code) || {};
        await insertSolution({
          error_code: (existing ? existing.error_code : code) || '—',
          lu_name: existing ? existing.lu_name : (meta.LU_NAME || null),
          package_name: existing ? existing.package_name : (meta.PACKAGE_NAME || null),
          component_code: existing ? existing.component_code : (meta.COMPONENT_CODE || null),
          component_name: comp || (existing ? existing.component_name : (meta.COMPONENT_NAME || null)),
          error_template: existing ? existing.error_template : (meta.ERROR_TEXT || null),
          ifs_version: (existing ? existing.ifs_version : meta.IFS_VERSION) || 'IFS10',
          title, who_acts: who, source, status: 'DRAFT', instructions: steps
        });
      }
      delete document.getElementById('newErrorCode').dataset.editId;
      await loadLibrary();
    } catch (e) { alert('Could not save: ' + (e.message || e)); return; }
    document.getElementById('addForm').style.display = 'none';
    renderLibList();
  });
  renderLibList();
}

    el.innerHTML = `<div class="empty"><div class="empty-icon">📚</div>No solutions added yet.</div>`;
    return;
  }

  const statusColors = {
    'NO_INSTRUCTION': { bg: 'var(--surface-2)', color: 'var(--text-3)', label: 'No instruction' },
    'DRAFT':          { bg: 'var(--warning-dim)', color: 'var(--warning)', label: 'Draft' },
