  };

  const visible = currentLibFilter === 'ALL' ? library : library.filter(l => l.status === currentLibFilter);

  if (visible.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📂</div>Nothing in this filter.</div>`;
    return;
  }

  el.innerHTML = visible.map(l => {
    const s = statusColors[l.status] || statusColors['NO_INSTRUCTION'];
    const src = sourceLabels[l.source] || sourceLabels['ADMIN'];
    const acceptRate = l.times_served > 0 ? Math.round((l.times_accepted / l.times_served) * 100) + '%' : '—';
    const hasSteps = l.instructions && l.instructions.length > 0;
    const isOwner = l.contributed_by_user_id && l.contributed_by_user_id === authUser.id;
    const canModerate = isPlatformAdmin;   // review queue is platform_admin-only
    return `
    <div class="lib-item">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap">
          <span class="lib-code">${escHtml(l.error_code)}</span>
          <span style="font-size:13px;font-weight:500">${escHtml(l.title)}</span>
          <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;background:${s.bg};color:${s.color}">${s.label}</span>
          <span style="font-size:10px;font-weight:500;color:${src.color}">${src.label}</span>
        </div>
        <div style="font-size:11px;color:var(--text-3);display:flex;gap:12px;flex-wrap:wrap">
          <span>📦 ${escHtml(l.component_name || l.component || '—')}</span>
          <span style="font-family:var(--mono)">${escHtml(l.package_name || '—')}</span>
          <span>👤 ${escHtml(l.who_acts || '—')}</span>
          <span>✓ Accepted <b style="color:var(--accent)">${l.times_accepted || 0}</b>× · shown ${l.times_served || 0} · ${acceptRate}</span>
        </div>
        ${l.error_template ? `<div style="font-size:11px;color:var(--text-3);font-style:italic;margin-top:2px">${escHtml(l.error_template)}</div>` : ''}
        ${l.status === 'REJECTED' && l.reject_note ? `<div style="font-size:11px;color:var(--danger);margin-top:4px">✗ Rejected: ${escHtml(l.reject_note)}</div>` : ''}
        ${!hasSteps ? `<div id="libAssembled_${l.id}" style="margin-top:8px"></div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        ${!hasSteps ? `<button class="btn btn-primary" style="font-size:11px;padding:4px 8px" data-assemble-lib="${l.id}">🪄 Assemble</button>` : ''}
        ${!hasSteps ? `<button class="btn btn-ghost" style="font-size:11px;padding:4px 8px" data-add="${l.id}">+ Add steps manually</button>` : ''}
        ${hasSteps && (l.status === 'DRAFT' || l.status === 'REJECTED') && (isOwner || canModerate) ? `<button class="btn btn-primary" style="font-size:11px;padding:4px 8px" data-submit="${l.id}">Submit for review</button>` : ''}
        ${canModerate && l.status === 'PENDING_REVIEW' ? `
          <button class="btn btn-primary" style="font-size:11px;padding:4px 8px;background:var(--success)" data-approve="${l.id}">✓ Approve</button>
          <button class="btn-danger" style="font-size:11px;padding:4px 8px" data-reject="${l.id}">✗ Reject</button>
        ` : ''}
        ${canModerate && (l.status === 'PUBLISHED' || l.status === 'VERIFIED') ? `<button class="btn btn-ghost" style="font-size:11px;padding:4px 8px" data-unpublish="${l.id}">Unpublish</button>` : ''}
        ${hasSteps && (isOwner || canModerate) ? `<button class="btn btn-ghost" style="font-size:11px;padding:4px 8px" data-add="${l.id}">✏️ Edit</button>` : ''}
        ${canModerate || (isOwner && (l.status === 'DRAFT' || l.status === 'REJECTED')) ? `<button class="btn-danger" data-del="${l.id}">🗑</button>` : ''}
      </div>
    </div>`; 
  }).join('');

  // After any write, refresh from the server (source of truth) and re-render.
  async function afterLibWrite(error) {
    if (error) { alert(error.message || String(error)); return; }
    await loadLibrary();
    renderLibList();
  }

  el.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const { error } = await sb.from('solutions').delete().eq('id', btn.dataset.del);
      await afterLibWrite(error);
    });
  });

  el.querySelectorAll('[data-submit]').forEach(btn => {
    btn.addEventListener('click', async () => {
      // DRAFT/REJECTED -> PENDING_REVIEW; allowed by the owner's RLS policy.
      const { error } = await sb.from('solutions')
        .update({ status: 'PENDING_REVIEW' }).eq('id', btn.dataset.submit);
      await afterLibWrite(error);
    });
  });

  el.querySelectorAll('[data-approve]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const { error } = await sb.rpc('moderate_solution',
        { p_solution_id: btn.dataset.approve, p_action: 'approve' });
      await afterLibWrite(error);
    });
  });

  el.querySelectorAll('[data-reject]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const reason = prompt('Reason for rejecting this solution:');
      if (reason === null) return;
      const { error } = await sb.rpc('moderate_solution',
        { p_solution_id: btn.dataset.reject, p_action: 'reject', p_reject_note: reason.trim() });
      await afterLibWrite(error);
    });
  });

  el.querySelectorAll('[data-unpublish]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const { error } = await sb.rpc('moderate_solution',
        { p_solution_id: btn.dataset.unpublish, p_action: 'unpublish' });
      await afterLibWrite(error);
    });
  });

  el.querySelectorAll('[data-assemble-lib]').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = library.find(l => l.id === btn.dataset.assembleLib);
      if (!item) return;
      const pseudoRow = {
        ERROR_CODE: item.error_code,
        LU_NAME: item.lu_name,
        PACKAGE_NAME: item.package_name,
        COMPONENT_CODE: item.component_code,
        COMPONENT_NAME: item.component_name,
        ERROR_TEXT: item.error_template,
        IFS_VERSION: item.ifs_version || 'IFS10'
      };
      const target = document.getElementById('libAssembled_' + item.id);
      generateAssembledAnswer(pseudoRow, btn, target).then(() => renderLibFilterBar());
    });
  });

  el.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = library.find(l => l.id === btn.dataset.add || l.id === btn.dataset.add);
      if (!item) return;
      document.getElementById('addForm').style.display = 'block';
      document.getElementById('newErrorCode').value = item.error_code || '';
      document.getElementById('newComponent').value = item.component_name || '';
      document.getElementById('newTitle').value = item.title || '';
      document.getElementById('newWho').value = item.who_acts || '';
      document.getElementById('newSource').value = item.source || 'ADMIN';
      document.getElementById('newSteps').value = (item.instructions || []).join('\n');
      document.getElementById('newErrorCode').dataset.editId = item.id;
    });
  });
}

// ── SEARCH TAB ───────────────────────────────────────────────
// Live = shown to end users. Status-only: a solution can't reach a live status
// without steps, and end users don't load the steps array anyway (it's gated).
function isLiveSolution(l) {
  return l.status === 'PUBLISHED' || l.status === 'VERIFIED' || l.status === 'NEEDS_REVIEW';
}

function renderSearch() {
  const el = document.getElementById('tab-search');
  el.innerHTML = `
    <div class="card">
      <div class="card-title">Search for a known error</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:12px">Paste or type the error message — you don't need to know the error code.</div>
      <input id="searchInput" placeholder="e.g. &quot;deletion not permitted when status is confirmed&quot;..."
        style="width:100%;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text)">
    </div>
    <div id="searchResults"></div>`;

  const input = document.getElementById('searchInput');
  let debounceTimer;
  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runSearch, 150);
  });
  input.focus();
  runSearch();
}

function runSearch() {
  const resultsEl = document.getElementById('searchResults');
  const qRaw = (document.getElementById('searchInput')?.value || '').trim();
  const q = qRaw.toLowerCase();

  if (!q) {
    resultsEl.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">🔎</div>Start typing — an error code if you know it, or just describe the error message in your own words.</div></div>`;
    return;
  }

  const words = q.split(/\s+/).filter(Boolean);
  const matchesText = (text) => {
    if (!text) return false;
    const t = text.toLowerCase();
    return words.every(w => t.includes(w));
  };

  // 1. Direct matches on curated, human-written fields — code, plain-English title,
  //    module, who-acts. End users describing "can't delete a PO line" will hit the title.
  const directHits = library.filter(l => isLiveSolution(l) && (
    matchesText(l.error_code) || matchesText(l.title) ||
    matchesText(l.component_name) || matchesText(l.who_acts)
  ));

  // 2. Fuzzy match against the raw catalog error text — same word-overlap engine used
  //    for screenshot OCR, so a rough paraphrase of the actual IFS message still matches
  //    even if the user doesn't know it's a "code" at all.
  const fuzzyCatalog = findCatalogMatches(qRaw, 20).filter(m => m.score >= 0.25);
  const fuzzyCodes = new Set(fuzzyCatalog.map(m => m.row.ERROR_CODE));
  const fuzzyLibHits = library.filter(l => isLiveSolution(l) && fuzzyCodes.has(l.error_code));

  const solutionHits = [...directHits];
  fuzzyLibHits.forEach(l => { if (!solutionHits.some(x => x.id === l.id)) solutionHits.push(l); });
  solutionHits.splice(15);

  const solvedCodes = new Set(solutionHits.map(l => l.error_code));

  // 3. Catalog entries matching the query that don't already have a live solution shown above
  const directCatalog = catalog.filter(r =>
    !solvedCodes.has(r.ERROR_CODE) && (matchesText(r.ERROR_CODE) || matchesText(r.ERROR_TEXT))
  );
  const fuzzyCatalogOnly = fuzzyCatalog
    .map(m => m.row)
    .filter(r => !solvedCodes.has(r.ERROR_CODE));

  const catalogHits = [];
  [...fuzzyCatalogOnly, ...directCatalog].forEach(r => {
    if (!catalogHits.some(x => x.ERROR_CODE === r.ERROR_CODE)) catalogHits.push(r);
  });
  catalogHits.splice(15);

  if (solutionHits.length === 0 && catalogHits.length === 0) {
    resultsEl.innerHTML = `
      <div class="card">
        <div class="empty">
          <div class="empty-icon">🔎</div>
          No matches for "${escHtml(qRaw)}".
          <div style="font-size:12px;margin-top:6px">Try pasting more of the exact error message, or a couple of the distinctive words in it.</div>
          ${isPlatformAdmin ? `<div style="margin-top:10px">
            <button class="btn btn-primary" onclick="switchToAddSolution('', '')">+ Add this to the library</button>
          </div>` : ''}
        </div>
      </div>`;
    return;
  }

  let html = '';

  if (solutionHits.length > 0) {
    const cta = (hasActiveSub || isPlatformAdmin) ? 'View the fix' : `🔓 Unlock the fix — ${priceStr()}`;
    html += `<div class="card"><div class="card-title" style="margin-bottom:10px">✓ Known solutions (${solutionHits.length})</div>`;
    // Preview only — no steps in the list. Steps arrive one at a time through the
    // gated reveal when the user chooses a specific fix.
    html += solutionHits.map(l => `
      <div style="border-bottom:1px solid var(--border);padding:12px 0">
        <span class="match-badge high" style="margin-bottom:8px;display:inline-block">✓ Solution available</span>
        <div class="solution-header">${escHtml(l.title)}</div>
        <div class="solution-sub">📦 ${escHtml(l.component_name || '—')} &nbsp;·&nbsp; 👤 ${escHtml(l.who_acts || '—')} &nbsp;·&nbsp; <span class="lib-code">${escHtml(l.error_code)}</span></div>
        <div id="revealArea_${l.id}" style="margin-top:8px">
          <button class="btn btn-primary" style="font-size:12px" data-reveal="${l.id}">${cta}</button>
        </div>
      </div>`).join('');
    html += `</div>`;
  }

  if (catalogHits.length > 0) {
    html += `<div class="card"><div class="card-title" style="margin-bottom:10px">⚠️ Catalog matches without a curated fix yet (${catalogHits.length})</div>`;
    html += catalogHits.map((r, i) => `
      <div style="border-bottom:1px solid var(--border);padding:10px 0">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
          <div>
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:2px">
              <span style="font-family:var(--mono);font-size:11px;color:var(--accent)">${escHtml(r.ERROR_CODE)}</span>
              <span style="font-size:11px;color:var(--text-3)">${escHtml(r.COMPONENT_NAME)}</span>
            </div>
            <div style="font-size:12px;color:var(--text)">${escHtml(r.ERROR_TEXT)}</div>
          </div>
          ${isPlatformAdmin ? `<div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn btn-primary" style="font-size:11px;padding:4px 8px;white-space:nowrap" data-assemble-search="${i}">🪄 Assemble</button>
            <button class="btn btn-ghost" style="font-size:11px;padding:4px 8px;white-space:nowrap" onclick="switchToAddSolution('${escHtml(r.ERROR_CODE)}', '${escHtml(r.COMPONENT_NAME)}')">+ Add manually</button>
          </div>` : ''}
        </div>
        <div id="searchAssembled_${i}" style="margin-top:8px"></div>
      </div>`).join('');
    html += `</div>`;
  }

  resultsEl.innerHTML = html;

  // Wire the gated reveal for each known solution.
  resultsEl.querySelectorAll('[data-reveal]').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = library.find(x => x.id === btn.dataset.reveal);
      if (!l) return;
      openResolution(l, { error_code: l.error_code, error_text: l.error_template || qRaw, confidence: 'high' },
        document.getElementById('revealArea_' + l.id), { payMode: 'direct' });
    });
  });

  if (isPlatformAdmin && catalogHits.length > 0) {
    resultsEl.querySelectorAll('[data-assemble-search]').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = btn.dataset.assembleSearch;
        const row = catalogHits[i];
        generateAssembledAnswer(row, btn, document.getElementById('searchAssembled_' + i));
      });
    });
  }
}

// ── BROWSE BY CATEGORY TAB ──────────────────────────────────────
let currentBrowseCategory = null;

function renderBrowse() {
  const el = document.getElementById('tab-browse');
  if (catalog.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">📁</div>Catalog not loaded yet. Check your connection.</div></div>`;
    return;
  }
  currentBrowseCategory ? renderBrowseCategory(el, currentBrowseCategory) : renderBrowseGrid(el);
}

function renderBrowseGrid(el) {
  const totals = {};
  catalog.forEach(r => { if (r.COMPONENT_NAME) totals[r.COMPONENT_NAME] = (totals[r.COMPONENT_NAME] || 0) + 1; });

  const published = {};
  library.forEach(l => {
    if (isLiveSolution(l) && l.component_name) published[l.component_name] = (published[l.component_name] || 0) + 1;
  });

  const categories = Object.keys(totals).sort((a, b) => totals[b] - totals[a]);

  el.innerHTML = `
    <div class="card">
      <div class="card-title">Browse by IFS module</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:14px">Explore known errors grouped by module — no need to search or upload anything.</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px">
        ${categories.map(c => {
          const pubCount = published[c] || 0;
          return `
          <div class="lib-item" style="cursor:pointer;flex-direction:column;align-items:flex-start;gap:6px" data-category="${escHtml(c)}">
            <div style="font-size:13px;font-weight:600">${escHtml(c)}</div>
            <div style="font-size:11px;color:var(--text-3)">${totals[c].toLocaleString()} known errors</div>
            ${pubCount > 0
              ? `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;background:var(--success-dim);color:var(--success)">✓ ${pubCount} published fix${pubCount === 1 ? '' : 'es'}</span>`
              : `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;background:var(--surface-2);color:var(--text-3)">No published fixes yet</span>`}
          </div>`;
        }).join('')}
      </div>
    </div>`;

  el.querySelectorAll('[data-category]').forEach(card => {
    card.addEventListener('click', () => {
      currentBrowseCategory = card.dataset.category;
      renderBrowse();
    });
  });
}

function renderBrowseCategory(el, category) {
  const inCategory = catalog.filter(r => r.COMPONENT_NAME === category);
  const solutions = library.filter(l => isLiveSolution(l) && l.component_name === category);
  const solvedCodes = new Set(solutions.map(l => l.error_code));
  const unsolved = inCategory.filter(r => !solvedCodes.has(r.ERROR_CODE));

  let html = `
    <div class="card">
      <button class="btn btn-ghost" id="browseBack" style="font-size:12px;margin-bottom:10px">← All modules</button>
      <div class="card-title" style="margin-bottom:2px">${escHtml(category)}</div>
      <div style="font-size:12px;color:var(--text-3)">${inCategory.length.toLocaleString()} known errors · ${solutions.length} published fix${solutions.length === 1 ? '' : 'es'}</div>
    </div>`;

  if (solutions.length > 0) {
    const cta = (hasActiveSub || isPlatformAdmin) ? 'View the fix' : `🔓 Unlock the fix — ${priceStr()}`;
    html += `<div class="card"><div class="card-title" style="margin-bottom:10px">✓ Published solutions (${solutions.length})</div>`;
    // Preview only — steps are revealed one at a time through the gated flow.
    html += solutions.map(l => `
      <div style="border-bottom:1px solid var(--border);padding:12px 0">
        <div class="solution-header">${escHtml(l.title)}</div>
        <div class="solution-sub">👤 ${escHtml(l.who_acts || '—')} &nbsp;·&nbsp; <span class="lib-code">${escHtml(l.error_code)}</span></div>
        <div id="revealArea_${l.id}" style="margin-top:8px">
          <button class="btn btn-primary" style="font-size:12px" data-reveal="${l.id}">${cta}</button>
        </div>
      </div>`).join('');
    html += `</div>`;
  }

  const shown = unsolved.slice(0, 30);
  if (unsolved.length > 0) {
    html += `<div class="card"><div class="card-title" style="margin-bottom:10px">⚠️ Known errors without a fix yet (${unsolved.length.toLocaleString()})</div>`;
    html += shown.map((r, i) => `
      <div style="border-bottom:1px solid var(--border);padding:10px 0">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
          <div>
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:2px">
              <span style="font-family:var(--mono);font-size:11px;color:var(--accent)">${escHtml(r.ERROR_CODE)}</span>
            </div>
            <div style="font-size:12px;color:var(--text)">${escHtml(r.ERROR_TEXT)}</div>
          </div>
          ${isPlatformAdmin ? `<div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn btn-primary" style="font-size:11px;padding:4px 8px;white-space:nowrap" data-assemble-browse="${i}">🪄 Assemble</button>
            <button class="btn btn-ghost" style="font-size:11px;padding:4px 8px;white-space:nowrap" onclick="switchToAddSolution('${escHtml(r.ERROR_CODE)}', '${escHtml(r.COMPONENT_NAME)}')">+ Add</button>
          </div>` : ''}
        </div>
        <div id="browseAssembled_${i}" style="margin-top:8px"></div>
      </div>`).join('');
    if (unsolved.length > shown.length) {
      html += `<div style="font-size:11px;color:var(--text-3);padding-top:10px">Showing ${shown.length} of ${unsolved.length.toLocaleString()} — use the Error Catalog tab to search the rest.</div>`;
    }
    html += `</div>`;
  }

  if (solutions.length === 0 && unsolved.length === 0) {
    html += `<div class="card"><div class="empty">Nothing in this module yet.</div></div>`;
  }

  el.innerHTML = html;

  document.getElementById('browseBack').addEventListener('click', () => {
    currentBrowseCategory = null;
    renderBrowse();
  });

  // Gated reveal per published solution.
  el.querySelectorAll('[data-reveal]').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = library.find(x => x.id === btn.dataset.reveal);
      if (!l) return;
      openResolution(l, { error_code: l.error_code, error_text: l.error_template || null, confidence: 'high' },
        document.getElementById('revealArea_' + l.id), { payMode: 'direct' });
    });
  });

  if (isPlatformAdmin) {
    el.querySelectorAll('[data-assemble-browse]').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = btn.dataset.assembleBrowse;
        const row = shown[i];
        generateAssembledAnswer(row, btn, document.getElementById('browseAssembled_' + i));
      });
    });
  }
}

let chatHistory = [];
let chatBusy = false;

];

          <div class="card-title" style="margin-bottom:2px">Ask a question</div>

        </div>

      <div style="display:flex;gap:8px;margin-top:12px;align-items:flex-end">

async function sendChatMessage() {
  if (chatBusy) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('chatStarters').innerHTML = '';
  chatHistory.push({ role: 'user', content: text });
  input.value = '';
  renderChatMessages();

  chatBusy = true;
  const sendBtn = document.getElementById('chatSendBtn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spin"></span>';

  const box = document.getElementById('chatMessages');
  box.insertAdjacentHTML('beforeend', `<div id="chatTyping" style="display:flex;justify-content:flex-start"><div style="padding:10px 13px;border-radius:12px;background:var(--surface-2);color:var(--text-3);font-size:13px">Thinking…</div></div>`);
  box.scrollTop = box.scrollHeight;

  try {
    const resp = await fetch('https://ifs-error-assistant-proxy.vercel.app/api/messages', {
      method: 'POST',
      headers: await authedHeaders(),
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `You are the Q&A assistant inside the IFS Error Assistant tool, helping business users with general questions about how IFS ERP works (business processes, statuses, terminology, who typically does what) — not necessarily tied to a specific error message.

You do NOT have access to this user's actual IFS company data, database, or account — never imply you can look anything up for their specific company. If a question depends on company-specific configuration, say so and suggest they check with their IFS Admin.

IMPORTANT — scope of your answers: give general orientation and background only. If the user describes a specific error message or code they're seeing and wants the fix, do NOT write out a specific numbered step-by-step resolution here. Instead, briefly explain in general terms what that kind of error usually means, and direct them to the Troubleshoot tab (upload a screenshot) or the Search tab to get the verified, curated step-by-step fix. That curated resolution is the paid product; this chat is for general questions, so keep it high-level and don't reproduce a full fix procedure for a specific error.

Use web search when it would make your answer more accurate (checking IFS documentation or the community forum), but keep answers conversational and reasonably concise — a few short paragraphs at most, not an exhaustive document. Write in your own words, don't quote sources at length.`,
        messages: chatHistory.map(m => ({ role: m.role, content: m.content }))
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);

    const reply = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
    chatHistory.push({ role: 'assistant', content: reply || "I wasn't able to generate a response — try rephrasing the question." });
  } catch (err) {
    chatHistory.push({ role: 'assistant', content: `⚠️ Something went wrong reaching the assistant: ${err.message || 'unknown error'}` });
  } finally {
    document.getElementById('chatTyping')?.remove();
    chatBusy = false;
    sendBtn.disabled = false;
    sendBtn.innerHTML = 'Send';
    renderChatMessages();
    input.focus();
  }
}

// ── Utilities ────────────────────────────────────────────────
function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}

// Standardizes a single solution step regardless of who/what wrote it:
// strips any leading numbering/bullets (the UI already auto-numbers steps),
// capitalizes the first letter, and ensures it ends with punctuation.
function normalizeStep(raw) {
  let s = (raw || '').trim();
  if (!s) return '';
  s = s.replace(/^(step\s*)?\d+\s*[.):]\s+/i, '');   // "1. " "1) " "1: " "Step 1: "
  s = s.replace(/^(step\s*)?\d+\s+[-–]\s+/i, '');     // "1 - "
  s = s.replace(/^[-*•]\s+/, '');                      // "- " "* " "• "
  s = s.replace(/^[A-Z][A-Z0-9' \-–—]{9,80}:\s+/, ''); // "UNDERSTAND THE CAUSE: " / "...— STOP AND ESCALATE: " style labels
  s = s.trim();
  if (!s) return '';
  s = s.charAt(0).toUpperCase() + s.slice(1);
  if (!/[.!?]$/.test(s)) s += '.';
  return s;
}

function normalizeStepList(steps) {
  return (steps || []).map(normalizeStep).filter(Boolean);
}

      await Promise.all([loadCatalog(), loadLibrary(), loadArchive(), loadIfsVersionSetting(), loadPaygPrice(), loadConsultantProfile(), loadNotifications()]);
      hydrateLibraryModules();   // catalog + library both loaded now
      appDataLoaded = true;
      renderNotifBell();
      renderTroubleshoot();
      handleBillingReturn();
    }
  } finally {
    booting = false;
  }
}

sb.auth.onAuthStateChange(() => boot());

// ── Init ─────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
